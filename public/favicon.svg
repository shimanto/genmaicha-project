<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="gc-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#964c1c" />
      <stop offset="100%" stop-color="#341a09" />
    </linearGradient>
    <linearGradient id="gc-grain" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f3d8aa" />
      <stop offset="100%" stop-color="#dc9a47" />
    </linearGradient>
  </defs>

  <rect width="100" height="100" rx="20" fill="url(#gc-bg)" />

  <!-- 玄米粒 (3粒) -->
  <ellipse cx="35" cy="38" rx="9" ry="14" fill="url(#gc-grain)" transform="rotate(-15 35 38)" />
  <ellipse cx="50" cy="44" rx="9" ry="14" fill="url(#gc-grain)" />
  <ellipse cx="65" cy="38" rx="9" ry="14" fill="url(#gc-grain)" transform="rotate(15 65 38)" />

  <!-- 抹茶緑のアクセント線 -->
  <line x1="22" y1="66" x2="78" y2="66" stroke="#7d9c46" stroke-width="2" stroke-linecap="round" />

  <!-- 玄米茶ちゃん のレタリング -->
  <text x="50" y="90" text-anchor="middle" font-family="serif" font-size="13" font-weight="700" fill="#fdf8f0" letter-spacing="1">
    玄米茶ちゃん
  </text>
</svg>
