<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="hou-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3d220f" />
      <stop offset="100%" stop-color="#814a1b" />
    </linearGradient>
    <radialGradient id="hou-grain" cx="50%" cy="55%" r="45%">
      <stop offset="0%" stop-color="#fdf8f1" />
      <stop offset="70%" stop-color="#e8bd78" />
      <stop offset="100%" stop-color="#a4621e" />
    </radialGradient>
  </defs>

  <rect width="100" height="100" rx="20" fill="url(#hou-bg)" />

  <!-- Rice grain (stylized) -->
  <ellipse cx="50" cy="50" rx="24" ry="14" fill="url(#hou-grain)" transform="rotate(-20 50 50)" />
  <path d="M 32 45 Q 50 55 68 45" stroke="#3d220f" stroke-width="2" fill="none" transform="rotate(-20 50 50)" />

  <!-- Kanji "焙" simplified dot accent -->
  <circle cx="78" cy="28" r="5" fill="#6f8f3f" />
  <circle cx="22" cy="72" r="3" fill="#faeedb" opacity="0.7" />

  <!-- Letter HOU -->
  <text x="50" y="92" text-anchor="middle" font-family="Georgia, serif" font-size="13" font-weight="700" fill="#faeedb" letter-spacing="2">
    HOU
  </text>
</svg>
