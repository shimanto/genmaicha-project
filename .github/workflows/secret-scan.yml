name: Secret Scan

on:
  push:
    branches: [main, master]
  pull_request:
  schedule:
    # 毎週月曜 03:00 JST (UTC 18:00 日曜) に定期フルスキャン
    - cron: '0 18 * * 0'
  workflow_dispatch:

jobs:
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout (with full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE は Organization アカウントの場合のみ必要。
          # shimanto は Personal なので未設定で動く
          GITLEAKS_ENABLE_COMMENTS: false
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: true
          GITLEAKS_ENABLE_SUMMARY: true
